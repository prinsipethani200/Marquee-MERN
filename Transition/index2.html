<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Card</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f2f2f2;
}

.container{
    background:linear-gradient(135deg,#2f0c4d,#9d4edd);
    padding:30px;
    border-radius:10px;
}

.card{
    width:250px;
    background:white;
    border-radius:12px;
    padding:20px;
    text-align:center;
    position:relative;
    box-shadow:0 5px 15px rgba(75, 7, 131, 0.2);
}

.profile{
    width:110px;
    height:110px;
    border-radius:10px;
    object-fit:cover;
    top: -100px;
}

.status{
    width:18px;
    height:18px;
    border-radius:50%;
    position:absolute;
    top:-12px;
    right:75px;
    background:#0a7a2f;
    border:2px solid white;
    animation:blink 1.5s infinite;
}

@keyframes blink{
    0%{
        background:#0a7a2f;
        box-shadow:0 0 0px #0a7a2f;
    }

    50%{
        background:#39ff14;
        box-shadow:
        0 0 10px #39ff14,
        0 0 20px #39ff14,
        0 0 30px #39ff14;
    }

    100%{
        background:#0a7a2f;
        box-shadow:0 0 0px #0a7a2f;
    }
}

h2{
    margin-top:15px;
    font-size:20px;
}

.role{
    color:gray;
    font-size:14px;
    margin-top:5px;
}

.stats{
    display:flex;
    justify-content:space-around;
    margin:20px 0;
}

.stats div{
    display:flex;
    flex-direction:column;
}

.stats span:first-child{
    font-weight:bold;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:10px;
}

.follow{
    background:#2b0a48;
    color:white;
    border:none;
    padding:8px 16px;
    border-radius:5px;
    cursor:pointer;
}

.message{
    background:#ddd;
    border:none;
    padding:8px 16px;
    border-radius:5px;
    cursor:pointer;
}
.pqr{
    margin-top: -35px;
}
</style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="pqr">
        <img src="https://cdn.create.vista.com/api/media/small/248620272/stock-photo-portrait-silhouette-woman" class="profile">
        </div>
        <div class="status"></div>

        <h2>Sophia Carter</h2>
        <p class="role">Web Developer</p>

        <div class="stats">
            <div>
                <span>100</span>
                <span>Posts</span>
            </div>

            <div>
                <span>940K</span>
                <span>Followers</span>
            </div>

            <div>
                <span>185</span>
                <span>Following</span>
            </div>
        </div>

        <div class="buttons">
            <button class="follow">Follow</button>
            <button class="message">Message</button>
        </div>

    </div>
</div>

</body>
</html>
