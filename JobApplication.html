<!DOCTYPE html>
<html>
<head>
    <title>Job Application Form</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#222;
        }

        .page{
            width: 720px;
            margin: 10px auto;
            background:white;
            padding: 30px;
        }

        h1{
            text-align:center;
            color:#333;
        }

        .section{
            background:#222;
            color:white;
            text-align:center;
            font-weight:bold;
            padding:6px;
            margin:25px 0 12px;
        }

        .row{
            display:flex;
            margin:10px 0;
            align-items:center;
        }

        .left, .right{
            width:50%;
            display:flex;
            align-items:center;
        }

        label{
            width:130px;
            font-size:14px;
        }

        input[type="text"],
        input[type="date"],
        input[type="email"],
        input[type="tel"]{
            border:none;
            border-bottom:1px solid #aaa;
            outline:none;
            flex:1;
        }

        input[type="checkbox"]{
            margin:0 15px;
        }

        .full label{
            width:auto;
            margin-right:10px;
        }

        .full input{
            flex:1;
        }
    </style>
</head>
<body>

<div class="page">
    <h1>JOB APPLICATION FORM</h1>

    <form action="jobApplicationActionPage.html" method="get">

        <div class="section">PERSONAL INFORMATION</div>

        <div class="row">
            <div class="left">
                <label for="name">Name:</label>
                <input type="text" id="name" required/>
            </div>
            <div class="right">
                <label for="dob">Date of Birth:</label>
                <input type="date" id="dob" required/>
            </div>
        </div>

        <div class="row">
            <div class="left">
                <label for="add">Address:</label>
                <input type="text" id="add" required/>
            </div>
            <div class="right">
                <input type="text" />
            </div>
        </div>

        <div class="row">
            <div class="left">
                <label for="city">City, State:</label>
                <input type="text" id="city" required/>
            </div>
            <div class="right">
                <label for="email">Email Address:</label>
                <input type="email" id="email" required/>
            </div>
        </div>

        <div class="row">
            <div class="left">
                <label for="phone no.">Phone Number:</label>
                <input type="tel" id="phone no" required/>
            </div>
            <div class="right">
                <label for="ssn">S.S.N:</label>
                <input type="text" id="ssn" required/>
            </div>
        </div>

        <div class="row">
            <div class="left">
                <label for="abc">Position applied for:</label>
                <input type="text" id="abc" required/>
            </div>
            <div class="right">
                <label for="dateavailable">Date available:</label>
                <input type="date" id="dateavailable" required/>
            </div>
        </div>

        <div class="row">
            <label >Desired Pay:</label>
            <input type="checkbox" id="cbox"/><label for="cbox">Hour</label>
            <input type="checkbox" id="cbox1"/><label for="cbox1">Salary</label>
        </div>

        <div class="row">
            <label>Employment desired:</label>
            <input type="checkbox" id="cbox2"/> <label for="cbox2">Full time</label>
            <input type="checkbox" id="cbox3"/> <label for="cbox3">Part time</label>
            <input type="checkbox" id="cbox4"/> <label for="cbox4">Seasonal</label>
        </div>

        <div class="section">EMPLOYMENT ELIGIBILITY</div>

        <div class="row">
            <label style="width:350px;">Are you legally eligible to work in the U.S.?</label>
            <input type="checkbox" id="cbox5"/> <label for="cbox5">Yes</label>
            <input type="checkbox" id="cbox6"/> <label for="cbox6">No</label>
        </div>

        <div class="row">
            <label style="width:350px;">Have you ever worked for this employer?</label>
            <input type="checkbox" id="cbox7"/> <label for="cbox7">Yes</label>
            <input type="checkbox" id="cbox8"/><label for="cbox8">No</label>
        </div>

        <div class="row full">
            <label for="pqr">If yes, write the start and end dates.</label>
            <input type="text" id="pqr" required/>
        </div>

        <div class="row">
            <label style="width:350px;">Have you ever been convicted of a felony?</label>
            <input type="checkbox" id="cbox9"/> <label for="cbox9">Yes</label>
            <input type="checkbox" id="cbox10"/> <label for="cbox10">No</label>
        </div>

        <div class="row full">
            <label for="xyz">If yes, please explain.</label>
            <input type="text" id="xyz"/>
        </div>

        <div class="section">EDUCATION</div>

        <div class="row">
            <div class="left">
                <label for="hs">High School:</label>
                <input type="text" id="hs" required/>
            </div>
            <div class="right">
                <label for="state">City / State:</label>
                <input type="text" id="state" required/>
            </div>
        </div>

        <div class="row">
            <div class="left">
                <label for="from">From:</label>
                <input type="text" id="from" required/>
            </div>
            <div class="right">
                <label for="to">To:</label>
                <input type="text" id="to" required/>
            </div>
        </div>

        <div class="row">
            <div class="left">
                <label>Graduate:</label>
                <input type="checkbox" id="cbox11"/> <label for="cbox11">Yes</label>
                <input type="checkbox" id="cbox12"/> <label for="cbox12">No</label>
            </div>
            <div class="right">
                <label for="dip">Diploma:</label>
                <input type="text" id="dip" required/>
            </div>
        </div>

        <div class="row">
            <div class="left">
                <label for="clg">College:</label>
                <input type="text" id="clg" required/>
            </div>
            <div class="right">
                <label for="ccity">City / State:</label>
                <input type="text" id="ccity" required/>
            </div>
        </div>

        <div class="row">
            <div class="left">
                <label for="from2">From:</label>
                <input type="text" id="from2" required/>
            </div>
            <div class="right">
                <label for="to2">To:</label>
                <input type="text" id="to2" required/>
            </div>
        </div>

        <div class="row">
            <div class="left">
                <label>Graduate:</label>
                <input type="checkbox" id="cbox13"/> <label for="cbox13">Yes</label>
                <input type="checkbox" id="cbox14"/> <label for="cbox14">No</label>
            </div>
            <div class="right">
                <label for="dip2">Diploma:</label>
                <input type="text" id="dip2" required/>
            </div>
        </div>

        <div class="row">
            <div class="left">
                <label for="other">Other:</label>
                <input type="text" id="other" required/>
            </div>
            <div class="right">
                <label for="cccity">City / State:</label>
                <input type="text" id="cccity" required/>
            </div>
        </div>

        <div class="row full">
            <label for="deg">Degree / Certification:</label>
            <input type="text" id="deg" required/>
        </div>

        <button type="submit">Submit</button>
        <button type="reset">Reset</button>

    </form>


</body>
</html>
