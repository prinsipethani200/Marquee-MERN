<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tabel</title>
    <style>
        table,
        td,
        th,
        tr{
            border: 1px solid;
            border-collapse: collapse;
            padding: 5px;
        }
        thead{
            background-color: blanchedalmond;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>Emp. Code</th>
                <th>Emp. Name</th>
                <th>Job Title</th>
                <th>Salary(LPA)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>911</td>
                <td>Zoya Shaikh</td>
                <td>Developer</td>
                <td>3.6</td>
            </tr> 
            <tr>
                <td>912</td>
                <td>Lisa Dev</td>
                <td>Tester</td>
                <td>2.8</td>
            </tr> 
            <tr>
                <td>913</td>
                <td>Deepak Jadeja</td>
                <td>Digital Marketing</td>
                <td>5.2</td>
            </tr> 
            <tr>
                <td>914</td>
                <td>Aditi Yewale</td>
                <td>Developer</td>
                <td>4</td>
            </tr>  
            <tr>
                <td>915</td>
                <td>Simren Rao</td>
                <td>HR</td>
                <td>5.6</td>
            </tr>      
         </tbody>
        <tfoot>
            <tr>
                <td colspan="4">This is table</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
