<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neumorphism Card</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }
 
    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#e6e6e6;
    }

    .card{
      width:320px;
      background:#e6e6e6;
      border-radius:20px;
      padding:25px;
      box-shadow:
      10px 10px 20px #c5c5c5,
      -10px -10px 20px #ffffff;
    }

    .top-icons{
      display:flex;
      justify-content:space-between;
      margin-bottom:20px;
      color:#777;
      font-size:20px;
    }

    .profile{
      text-align:center;
    }

    .profile img{
      width:120px;
      height:120px;
      border-radius:50%;
      object-fit:cover;
      padding:6px;
      background:#e6e6e6;
      box-shadow:
      6px 6px 12px #c5c5c5,
      -6px -6px 12px #ffffff;
    }

    .profile h2{
      margin-top:18px;
      color:#444;
    }

    .profile p{
      margin-top:8px;
      color:#777;
      font-size:16px;
    }

    .social-icons{
      display:flex;
      justify-content:center;
      gap:20px;
      margin:25px 0;
    }

    .icon{
      width:45px;
      height:45px;
      border-radius:50%;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#e6e6e6;
      box-shadow:
      5px 5px 10px #c5c5c5,
      -5px -5px 10px #ffffff;
      font-size:18px;
    }

    .buttons{
      display:flex;
      gap:15px;
    }

    .btn{
      flex:1;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#e6e6e6;
      font-size:16px;
      box-shadow:
      5px 5px 10px #c5c5c5,
      -5px -5px 10px #ffffff;
    }

    .stats{
      display:flex;
      justify-content:space-between;
      margin-top:30px;
    }

    .stats div{
      display:flex;
      align-items:center;
      gap:5px;
    }
  </style>

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

</head>
<body>

  <div class="card">

    <div class="top-icons">
      <i class="fa-solid fa-arrow-left"></i>
      <i class="fa-solid fa-ellipsis-vertical"></i>
    </div>

    <div class="profile">
      <img src="https://img.magnific.com/free-vector/blue-circle-with-white-user_78370-4707.jpg?semt=ais_hybrid&w=740&q=80"
      alt="profile">

      <h2>CodingNepal</h2>
      <p>Designer & Developer</p>
    </div>

    <div class="social-icons">
      <div class="icon">
        <i class="fa-brands fa-facebook-f"></i>
      </div>

      <div class="icon">
        <i class="fa-brands fa-twitter"></i>
      </div>

      <div class="icon">
        <i class="fa-brands fa-instagram"></i>
      </div>

      <div class="icon">
        <i class="fa-brands fa-youtube"></i>
      </div>
    </div>

    <div class="buttons">
      <button class="btn">Message</button>
      <button class="btn">Subscribe</button>
    </div>

    <div class="stats">
      <div>
        <i class="fa-regular fa-heart"></i>
        20.4k
      </div>

      <div>
        <i class="fa-regular fa-comment"></i>
        14.3k
      </div>

      <div>
        <i class="fa-solid fa-share"></i>
        12.8k
      </div>
    </div>

  </div>

</body>
</html>
